openapi: "3.0.3"

info:
  title: NotaryLink API
  version: "1.0.0"
  description: API contract for the NotaryLink notarial platform

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Auth
    description: Authentication endpoints
  - name: User
    description: User profile endpoints
  - name: Project
    description: Project management endpoints

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-otp:
    post:
      tags: [Auth]
      operationId: verifyOtp
      summary: Verify the 6-digit OTP code sent by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '200':
          description: OTP verified successfully
        '400':
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/resend-otp:
    post:
      tags: [Auth]
      operationId: resendOtp
      summary: Resend the OTP code to the user's email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendOtpRequest'
      responses:
        '200':
          description: OTP resent successfully
        '400':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/user/me:
    get:
      tags: [User]
      operationId: getCurrentUser
      summary: Get the currently authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects:
    get:
      tags: [Project]
      operationId: getProjects
      summary: Get all projects for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Projects retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Project]
      operationId: createProject
      summary: Create a new project for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects/{id}/documents:
    get:
      tags: [Project]
      operationId: getProjectDocuments
      summary: Get required and uploaded documents for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project documents retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDocumentsResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects/{id}/documents/{documentTypeId}/upload:
    post:
      tags: [Project]
      operationId: uploadProjectDocument
      summary: Upload a document file for a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: documentTypeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDocumentItem'
        '400':
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project or document type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/projects/{id}:
    get:
      tags: [Project]
      operationId: getProject
      summary: Get a single project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Project]
      operationId: updateProject
      summary: Update an existing project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Project]
      operationId: deleteProject
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Project deleted successfully
        '404':
          description: Project not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    VerifyOtpRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    ResendOtpRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    AuthResponse:
      type: object
      required: [accessToken, tokenType]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          default: Bearer

    User:
      type: object
      required: [id, email, firstName, lastName]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          nullable: true
        role:
          type: string
          enum: [USER, NOTARY, ADMIN]
        otpVerified:
          type: boolean

    UpdateProjectRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        type:
          type: string
          enum: [REAL_ESTATE_PURCHASE, SUCCESSION, DONATION, OTHER]
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETE, SENT, ARCHIVED]

    CreateProjectRequest:
      type: object
      required: [title, type]
      properties:
        title:
          type: string
          maxLength: 255
        type:
          type: string
          enum: [REAL_ESTATE_PURCHASE, SUCCESSION, DONATION, OTHER]
        description:
          type: string
          nullable: true

    ProjectResponse:
      type: object
      required: [id, title, type, status, progress, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [REAL_ESTATE_PURCHASE, SUCCESSION, DONATION, OTHER]
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETE, SENT, ARCHIVED]
        description:
          type: string
          nullable: true
        progress:
          type: integer
        projectTypeName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProjectDocumentItem:
      type: object
      required: [documentTypeId, documentTypeName, required, uploaded]
      properties:
        documentTypeId:
          type: string
        documentTypeName:
          type: string
        documentTypeCategory:
          type: string
          nullable: true
        required:
          type: boolean
        uploaded:
          type: boolean
        fileUrl:
          type: string
          nullable: true
        documentStatus:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          nullable: true
        uploadedAt:
          type: string
          format: date-time
          nullable: true

    ProjectDocumentsResponse:
      type: object
      required: [projectId, projectTitle, totalRequired, totalUploaded, progress, documents]
      properties:
        projectId:
          type: string
        projectTitle:
          type: string
        projectTypeName:
          type: string
          nullable: true
        totalRequired:
          type: integer
        totalUploaded:
          type: integer
        progress:
          type: integer
        documents:
          type: array
          items:
            $ref: '#/components/schemas/ProjectDocumentItem'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
